name: Daily WC Bulletin

on:
  schedule:
    # Her gün 07:00 UTC — maçlardan önce sabah bülteni
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Manuel tetikleme: GitHub Actions sekmesinden "Run workflow" butonu

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulum
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-bulletin.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements-bulletin.txt

      - name: Bülten gönder
        env:
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PERSONAL_CHANNEL: ${{ secrets.TELEGRAM_PERSONAL_CHANNEL }}
          FOOTBALL_DATA_ORG_KEY:     ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}
        run: python -m ops.wc_paper_shadow --deliver
