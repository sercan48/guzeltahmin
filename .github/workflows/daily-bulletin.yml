name: Daily WC Bulletin

on:
  # Birincil tetikleyici: settlement tamamlanınca çalış (07:00 UTC sonrası)
  # Settlement her gün güvenilir şekilde çalışır → bülten de güvenilir olur.
  workflow_run:
    workflows: ["Daily Settlement"]
    types: [completed]

  workflow_dispatch:
    inputs:
      date:
        description: 'Tarih (YYYY-MM-DD). Boş = yarın UTC.'
        required: false
        default: ''

jobs:
  bulletin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulum
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-bulletin.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements-bulletin.txt

      - name: Bülten gönder
        env:
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PERSONAL_CHANNEL: ${{ secrets.TELEGRAM_PERSONAL_CHANNEL }}
          FOOTBALL_DATA_ORG_KEY:     ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(date -u -d "+1 day" +%Y-%m-%d)
          fi
          echo "Bülten tarihi: $DATE"
          python -m ops.wc_paper_shadow --deliver --date "$DATE"

      - name: Kota takibini kaydet
        if: always()
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data/odds_quota.json || true
          git diff --cached --quiet || git commit -m "chore: odds quota snapshot [skip ci]"
          git push || true
