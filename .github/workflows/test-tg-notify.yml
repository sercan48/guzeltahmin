name: Test TG Notify

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Admin kasa bildirim testi — kisisel sohbet
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, requests

          token   = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ.get("TELEGRAM_ADMIN_CHAT_ID", "").strip()

          if not chat_id:
              print("HATA: TELEGRAM_ADMIN_CHAT_ID secret ayarlanmamis!")
              exit(1)

          text = (
              "✅ <b>Admin Kasa Bildirimi — Test</b>\n\n"
              "Bu mesaj kişisel sohbetinize başarıyla ulaştı.\n"
              "Kasa yönetim sistemi hazır."
          )
          r = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": text, "parse_mode": "HTML"},
              timeout=10,
          )
          resp = r.json()
          if resp.get("ok"):
              print(f"Mesaj gönderildi — message_id={resp['result']['message_id']}")
          else:
              print(f"HATA: {resp}")
              exit(1)
          PYEOF
