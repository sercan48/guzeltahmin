name: Test TG Notify

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Kisisel chat ID bul ve mesaj at
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, requests, json

          token = os.environ["TELEGRAM_BOT_TOKEN"]

          # Son güncellemeleri çek — bota mesaj atan herkesin chat ID'si gelir
          r = requests.get(
              f"https://api.telegram.org/bot{token}/getUpdates",
              timeout=10,
          )
          data = r.json()
          print("=== getUpdates sonucu ===")
          results = data.get("result", [])
          if not results:
              print("Henüz mesaj yok. Bota 'merhaba' yaz ve tekrar çalıştır.")
          else:
              seen = set()
              for upd in results:
                  msg = upd.get("message") or upd.get("channel_post") or {}
                  chat = msg.get("chat", {})
                  cid  = chat.get("id")
                  ctype = chat.get("type", "?")
                  title = chat.get("title") or chat.get("username") or chat.get("first_name", "?")
                  if cid and cid not in seen:
                      seen.add(cid)
                      print(f"  chat_id={cid}  type={ctype}  name={title}")
          PYEOF
