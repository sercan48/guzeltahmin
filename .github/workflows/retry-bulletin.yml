name: Retry WC Bulletin

# Bu workflow sadece daily-bulletin.yml iki denemede de başarısız olunca
# çağrılır. delay_minutes kadar bekler, sonra bir kez daha dener.
# Manuel olarak da tetiklenebilir.

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Tarih (YYYY-MM-DD)'
        required: true
      delay_minutes:
        description: 'Kaç dakika beklensin (varsayılan: 60)'
        required: false
        default: '60'

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 75   # delay + script süresi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulum
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-bulletin.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements-bulletin.txt

      # ── Gecikme ──────────────────────────────────────────────────────────
      - name: Bekleme süresi
        run: |
          DELAY="${{ github.event.inputs.delay_minutes }}"
          DELAY="${DELAY:-60}"
          echo "$(date -u '+%H:%M UTC') — ${DELAY} dakika bekleniyor..."
          sleep $(( DELAY * 60 ))
          echo "$(date -u '+%H:%M UTC') — Bekleme tamamlandı, bülten deneniyor."

      # ── Tek deneme (resilience zaten Python katmanında sağlanıyor) ────────
      - name: Bülten gönder (retry)
        env:
          TELEGRAM_BOT_TOKEN:           ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PERSONAL_CHANNEL:    ${{ secrets.TELEGRAM_PERSONAL_CHANNEL }}
          FOOTBALL_DATA_ORG_KEY:        ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
          ODDS_API_KEY:                 ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL:                 ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:    ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m ops.wc_paper_shadow --deliver --date "${{ github.event.inputs.date }}"

      - name: Kota takibini kaydet
        if: always()
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data/odds_quota.json || true
          git diff --cached --quiet || git commit -m "chore: retry bulletin quota snapshot [skip ci]"
          git push || true
