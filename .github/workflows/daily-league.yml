name: Daily League Bulletin

on:
  schedule:
    # 10:00 UTC her gün — Avrupa ligleri akşam başlar, öğlen tahmini uygun
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      league:
        description: 'Lig kodu (örn: SuperLig). Boş = aktif tüm ligler.'
        required: false
        default: ''
      days:
        description: 'Kaç günlük fixture (varsayılan 1)'
        required: false
        default: '1'
      dry_run:
        description: 'Dry run (Telegram göndermez)'
        type: boolean
        required: false
        default: false

jobs:
  league-bulletin:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulum
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-bulletin.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements-bulletin.txt

      - name: Parametreleri belirle
        id: params
        run: |
          LEAGUE="${{ github.event.inputs.league }}"
          DAYS="${{ github.event.inputs.days }}"
          DRY="${{ github.event.inputs.dry_run }}"
          [ -z "$DAYS" ] && DAYS="1"
          echo "league=$LEAGUE"  >> "$GITHUB_OUTPUT"
          echo "days=$DAYS"      >> "$GITHUB_OUTPUT"
          echo "dry=$DRY"        >> "$GITHUB_OUTPUT"

      - name: Lig tahminleri üret ve gönder
        id: predict
        env:
          FOOTBALL_DATA_ORG_KEY:     ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
          API_FOOTBALL_KEY:          ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PERSONAL_CHANNEL: ${{ secrets.TELEGRAM_PERSONAL_CHANNEL }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          LEAGUE_ARG=""
          [ -n "${{ steps.params.outputs.league }}" ] && LEAGUE_ARG="--league ${{ steps.params.outputs.league }}"

          if [ "${{ steps.params.outputs.dry }}" = "true" ]; then
            python -m ops.league_live_predictor --dry-run $LEAGUE_ARG --days ${{ steps.params.outputs.days }}
          else
            python -m ops.league_live_predictor --deliver $LEAGUE_ARG --days ${{ steps.params.outputs.days }}
          fi

      - name: Tahminleri commit et
        if: steps.predict.outcome == 'success'
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data/league_predictions/ || true
          git diff --cached --quiet || git commit -m "chore: league predictions snapshot [skip ci]"
          git push || true
