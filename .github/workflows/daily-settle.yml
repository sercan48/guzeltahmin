name: Daily Settlement

on:
  schedule:
    # 07:00 UTC = 10:00 Türkiye — dün oynanan maçların sonuçları
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulum
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-bulletin.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements-bulletin.txt

      - name: Sonuçları kaydet
        continue-on-error: true
        env:
          FOOTBALL_DATA_ORG_KEY:      ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ops/result_settler.py --settle

      - name: API-Football yedek settlement (backfill)
        continue-on-error: true
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python -m ops.result_backfiller --settle

      - name: CLV Tracker güncelle
        continue-on-error: true
        run: python ops/clv_tracker.py --update

      - name: Maç sonuçlarını Telegram'a bildir
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PERSONAL_CHANNEL: ${{ secrets.TELEGRAM_PERSONAL_CHANNEL }}
        run: python -m ops.settlement_notifier --deliver

      - name: Settlement verisini commit et
        if: always()
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data/shadow_settlements.jsonl data/shadow_accuracy.json || true
          git add data/clv_log.jsonl data/clv_summary.json data/shadow_predictions.jsonl || true
          git diff --cached --quiet || git commit -m "chore: daily settlement + CLV update [skip ci]"
          git push || true
