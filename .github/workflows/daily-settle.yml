name: Daily Settlement

on:
  schedule:
    # 07:00 UTC = 10:00 Türkiye — dün oynanan maçların sonuçları
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulum
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-bulletin.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements-bulletin.txt

      - name: Sonuçları kaydet
        continue-on-error: true
        env:
          FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
        run: python ops/result_settler.py --settle

      - name: Settlement verisini commit et
        if: always()
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data/shadow_settlements.jsonl data/shadow_accuracy.json || true
          git diff --cached --quiet || git commit -m "chore: daily settlement [skip ci]"
          git push || true
